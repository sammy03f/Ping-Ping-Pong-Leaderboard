<!DOCTYPE html>
<html>
<head>
<title>Pike Ping Pong Rankings</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h1>🏓 Pike Ping Pong Leaderboard</h1>

<table id="leaderboard">
<thead>
<tr>
<th>Rank</th>
<th>Player</th>
<th>Rating</th>
</tr>
</thead>
<tbody></tbody>
</table>

<h2>Report Match</h2>

<form id="matchForm">
<select id="playerA"></select>
<select id="playerB"></select>

<select id="winner">
<option value="A">Player A Wins</option>
<option value="B">Player B Wins</option>
</select>

<button type="submit">Submit Match</button>
</form>

<script src="script.js"></script>

</body>
</html>
